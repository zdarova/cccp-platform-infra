name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/deploy.yml']
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-cccp-poc
  LOCATION: westeurope
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Purge soft-deleted resources
        run: |
          # Purge soft-deleted Key Vault
          az keyvault purge --name "kv-cccp-pibz5vm5tus3o" 2>/dev/null || true
          # Purge soft-deleted Cognitive Services
          for name in $(az cognitiveservices account list-deleted --query "[?contains(name,'cccp')].name" -o tsv 2>/dev/null); do
            location=$(az cognitiveservices account list-deleted --query "[?name=='$name'].location" -o tsv)
            az cognitiveservices account purge --name "$name" --resource-group $RESOURCE_GROUP --location "$location" 2>/dev/null || true
          done

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --name "deploy-$(date +%Y%m%d%H%M%S)" \
            --template-file infra/main.bicep \
            --parameters pgPassword="${{ secrets.PG_PASSWORD }}" \
            --mode Incremental \
            --output table

  verify:
    name: 🔍 Verify
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Check resources
        run: |
          echo "=== Deployed Resources ==="
          az resource list --resource-group $RESOURCE_GROUP --query "[].{name:name, type:type}" -o table
